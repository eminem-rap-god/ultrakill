<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRAMURDER - Enhanced FPS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #0f0;
            overflow: hidden;
            filter: contrast(1.1) brightness(1.05);
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
            filter: url(#crt-filter);
        }

        /* CRT Effects */
        svg {
            display: none;
        }

        #scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 150;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 14px;
            z-index: 100;
            text-shadow: 0 0 10px #0f0;
        }

        .hud-item {
            margin: 8px 0;
            border: 1px solid #0f0;
            padding: 5px 10px;
            background: rgba(0, 255, 0, 0.1);
        }

        #health {
            color: #00ff00;
        }

        #ammo {
            color: #ffff00;
        }

        #score {
            color: #ff0000;
            font-size: 20px;
            font-weight: bold;
        }

        #weapon {
            color: #00ffff;
        }

        #combo {
            position: absolute;
            top: 50%;
            right: 50px;
            font-size: 28px;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            font-weight: bold;
            z-index: 100;
        }

        #styleRank {
            position: absolute;
            top: 100px;
            right: 50px;
            font-size: 18px;
            border: 2px solid #0f0;
            padding: 10px;
            background: rgba(0, 255, 0, 0.2);
            z-index: 100;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 2px solid #00ff00;
            border-radius: 50%;
            z-index: 200;
            pointer-events: none;
            box-shadow: 0 0 10px #00ff00;
        }

        #melee-indicator {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
            z-index: 100;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            text-align: center;
            border: 3px solid #ff0000;
            display: none;
            z-index: 300;
            font-size: 32px;
            box-shadow: 0 0 50px #ff0000;
        }

        #gameOver button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 18px;
            background: #ff0000;
            color: #0f0;
            border: 2px solid #0f0;
            cursor: pointer;
            text-shadow: 0 0 5px #ff0000;
        }

        #gameOver button:hover {
            box-shadow: 0 0 20px #ff0000;
        }

        #minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            border: 2px solid #0f0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
        }
    </style>
</head>
<body>
    <svg style="display:none">
        <filter id="crt-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="1" />
        </filter>
    </svg>

    <div id="gameContainer"></div>
    <div id="scanlines"></div>

    <div id="hud">
        <div class="hud-item" id="health">❤ Health: 100</div>
        <div class="hud-item" id="ammo">◆ Ammo: ∞</div>
        <div class="hud-item" id="weapon">⚔ Weapon: PISTOL</div>
        <div class="hud-item" id="score">$ Score: 0</div>
        <div class="hud-item" id="kills">☠ Kills: 0</div>
    </div>

    <div id="combo">COMBO: 0x</div>
    <div id="styleRank">STYLE: D</div>
    <div id="melee-indicator">MELEE READY! [F]</div>
    <div id="crosshair"></div>
    <canvas id="minimap"></canvas>

    <div id="gameOver">
        <div>GAME OVER</div>
        <div id="finalScore">Score: 0</div>
        <div id="finalCombo">Max Combo: 0x</div>
        <button onclick="location.reload()">Restart</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ==================== GAME STATE ====================
        let scene, camera, renderer;
        let player, enemies = [];
        let health = 100, score = 0, killCount = 0;
        let keys = {};
        let selectedWeapon = 0;
        const weapons = ['PISTOL', 'SHOTGUN', 'ROCKET', 'MELEE'];
        let canShoot = true;
        let gameActive = true;

        // Advanced mechanics
        let comboCounter = 0;
        let comboTimer = 0;
        let comboMultiplier = 1;
        let styleRank = 'D';
        let lastKillTime = 0;
        let maxCombo = 0;

        // Dash system
        let canDash = true;
        let dashCooldown = 0.5;
        let lastDashTime = 0;

        // Melee system
        let canMelee = true;
        let meleeCooldown = 0.6;
        let lastMeleeTime = 0;

        // Screen shake
        let shakeIntensity = 0;
        let originalCameraPos = new THREE.Vector3();

        // Particles
        let particles = [];

        // ==================== INITIALIZATION ====================
        function init() {
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            scene.fog = new THREE.Fog(0x0a0a0a, 300, 600);

            // Camera
            camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 0);
            originalCameraPos.copy(camera.position);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFShadowShadowMap;
            document.getElementById('gameContainer').appendChild(renderer.domElement);

            // Lighting - More dramatic
            const ambientLight = new THREE.AmbientLight(0xff6600, 0.4);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xff3300, 1.2);
            directionalLight.position.set(100, 100, 100);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 4096;
            directionalLight.shadow.mapSize.height = 4096;
            directionalLight.shadow.camera.far = 500;
            scene.add(directionalLight);

            // Neon ground
            const groundGeometry = new THREE.PlaneGeometry(500, 500);
            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a1a1a,
                metalness: 0.8,
                roughness: 0.2
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Neon walls
            createNeonWalls();

            // Player
            player = {
                position: new THREE.Vector3(0, 1.6, 0),
                velocity: new THREE.Vector3(0, 0, 0),
                speed: 0.35,
                dashSpeed: 0.8,
                jumpPower: 0.18,
                onGround: false,
                isDashing: false,
                dashDirection: new THREE.Vector3(0, 0, -1)
            };

            // Spawn enemies
            for (let i = 0; i < 8; i++) {
                spawnEnemy();
            }

            // Event listeners
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onShoot);
            window.addEventListener('resize', onWindowResize);

            // Pointer lock
            document.addEventListener('click', () => {
                renderer.domElement.requestPointerLock = renderer.domElement.requestPointerLock || renderer.domElement.mozRequestPointerLock;
                renderer.domElement.requestPointerLock();
            });

            // Start game loop
            gameLoop();
        }

        function createNeonWalls() {
            const wallConfigs = [
                { pos: [0, 5, -250], size: [500, 50, 10], color: 0xff0000 },
                { pos: [0, 5, 250], size: [500, 50, 10], color: 0x00ff00 },
                { pos: [-250, 5, 0], size: [10, 50, 500], color: 0x0000ff },
                { pos: [250, 5, 0], size: [10, 50, 500], color: 0xffff00 }
            ];

            wallConfigs.forEach(wall => {
                const geometry = new THREE.BoxGeometry(...wall.size);
                const material = new THREE.MeshStandardMaterial({
                    color: wall.color,
                    emissive: wall.color,
                    emissiveIntensity: 0.3,
                    metalness: 0.9,
                    roughness: 0.1
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(...wall.pos);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);

                // Add point light for glow effect
                const light = new THREE.PointLight(wall.color, 1, 200);
                light.position.copy(mesh.position);
                scene.add(light);
            });
        }

        function spawnEnemy() {
            const geometry = new THREE.BoxGeometry(1, 2, 1);
            const enemyColor = Math.random() > 0.5 ? 0xff0000 : 0xff6600;
            const material = new THREE.MeshStandardMaterial({
                color: enemyColor,
                emissive: enemyColor,
                emissiveIntensity: 0.5,
                metalness: 0.6,
                roughness: 0.4
            });
            const enemy = new THREE.Mesh(geometry, material);

            let x, z, dist;
            do {
                x = (Math.random() - 0.5) * 400;
                z = (Math.random() - 0.5) * 400;
                dist = Math.sqrt(x * x + z * z);
            } while (dist < 50);

            enemy.position.set(x, 1, z);
            enemy.castShadow = true;
            enemy.receiveShadow = true;

            const enemyData = {
                mesh: enemy,
                health: 40,
                maxHealth: 40,
                speed: 0.09 + Math.random() * 0.03,
                attackCooldown: 0,
                lastAttackTime: 0,
                isBoss: Math.random() > 0.85
            };

            if (enemyData.isBoss) {
                enemyData.health = 150;
                enemyData.maxHealth = 150;
                enemyData.speed = 0.12;
                enemy.scale.set(1.8, 2.5, 1.8);
                enemy.material.color.set(0xffffff);
                enemy.material.emissive.set(0xffffff);
                enemy.material.emissiveIntensity = 0.8;
            }

            enemies.push(enemyData);
            scene.add(enemy);
        }

        // ==================== INPUT HANDLERS ====================
        function onKeyDown(e) {
            keys[e.key.toLowerCase()] = true;

            // Jump
            if (e.key === ' ' && player.onGround) {
                player.velocity.y = player.jumpPower;
                player.onGround = false;
            }

            // Dash
            if ((e.key === 'shift' || e.key === 'Shift') && canDash && !player.isDashing) {
                performDash();
            }

            // Melee
            if (e.key === 'f' || e.key === 'F') {
                performMelee();
            }

            // Weapon switch
            if (e.key === 'e' || e.key === 'E') {
                selectedWeapon = (selectedWeapon + 1) % weapons.length;
                updateWeaponDisplay();
            }

            // Number keys for weapon select
            for (let i = 1; i <= 4; i++) {
                if (e.key === String(i)) {
                    selectedWeapon = i - 1;
                    updateWeaponDisplay();
                }
            }
        }

        function onKeyUp(e) {
            keys[e.key.toLowerCase()] = false;
        }

        function onMouseMove(e) {
            if (document.pointerLockElement) {
                const sensitivity = 0.004;
                camera.rotation.order = 'YXZ';
                camera.rotation.y -= e.movementX * sensitivity;
                camera.rotation.x -= e.movementY * sensitivity;
                camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
            }
        }

        function onShoot() {
            if (!canShoot || !gameActive) return;

            if (selectedWeapon === 3) {
                performMelee();
                return;
            }

            canShoot = false;

            const weaponFireRates = [80, 120, 180];
            setTimeout(() => canShoot = true, weaponFireRates[selectedWeapon]);

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

            const damages = [15, 35, 75];
            const damage = damages[selectedWeapon];

            let hitEnemy = false;

            for (let enemy of enemies) {
                if (raycaster.ray.distanceToPoint(enemy.mesh.position) < 1.5) {
                    enemy.health -= damage;
                    hitEnemy = true;

                    // Screen shake
                    shakeIntensity = Math.min(shakeIntensity + 0.3, 1);

                    // Hit effect
                    enemy.mesh.material.color.set(0xffffff);
                    setTimeout(() => {
                        enemy.mesh.material.color.set(enemy.isBoss ? 0xffffff : 0xff6600);
                    }, 50);

                    createBloodParticles(enemy.mesh.position);

                    if (enemy.health <= 0) {
                        onEnemyKilled(enemy);
                    }
                }
            }

            if (hitEnemy) {
                addScore(50 * comboMultiplier);
                addCombo();
            }
        }

        function performDash() {
            if (Time.time - lastDashTime < dashCooldown) return;

            player.isDashing = true;
            canDash = false;
            lastDashTime = Date.now() / 1000;

            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);

            let dashDir = new THREE.Vector3(0, 0, 0);
            if (keys['w']) dashDir.add(forward);
            if (keys['s']) dashDir.add(forward.multiplyScalar(-1));
            if (keys['a']) dashDir.add(right.multiplyScalar(-1));
            if (keys['d']) dashDir.add(right);

            if (dashDir.length() === 0) dashDir = forward;
            dashDir.normalize();

            player.velocity.add(dashDir.multiplyScalar(player.dashSpeed));

            // Screen shake
            shakeIntensity = 0.5;

            // Dash particles
            for (let i = 0; i < 10; i++) {
                createParticle(player.position.clone(), dashDir.multiplyScalar(0.3), 0x00ff00, 0.3);
            }

            setTimeout(() => {
                player.isDashing = false;
                setTimeout(() => canDash = true, dashCooldown * 1000);
            }, 150);
        }

        function performMelee() {
            if (Date.now() / 1000 - lastMeleeTime < meleeCooldown) return;

            lastMeleeTime = Date.now() / 1000;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

            for (let enemy of enemies) {
                if (raycaster.ray.distanceToPoint(enemy.mesh.position) < 2.5) {
                    enemy.health -= 50;

                    // Knockback
                    const knockback = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    enemy.mesh.position.add(knockback.multiplyScalar(0.3));

                    shakeIntensity = 0.8;

                    createBloodParticles(enemy.mesh.position);

                    addScore(100 * comboMultiplier);
                    addCombo();

                    if (enemy.health <= 0) {
                        onEnemyKilled(enemy);
                    }
                }
            }
        }

        // ==================== GAMEPLAY ====================
        function onEnemyKilled(enemy) {
            score += (enemy.isBoss ? 1000 : 200) * comboMultiplier;
            killCount++;
            lastKillTime = Date.now() / 1000;

            // Big screen shake on kill
            shakeIntensity = 1;

            // Explosion particles
            for (let i = 0; i < 30; i++) {
                const angle = (Math.PI * 2 / 30) * i;
                const dir = new THREE.Vector3(Math.cos(angle), Math.random() * 0.5, Math.sin(angle)).normalize();
                createParticle(enemy.mesh.position.clone(), dir, 0xff0000, 0.8);
            }

            scene.remove(enemy.mesh);
            enemies.splice(enemies.indexOf(enemy), 1);

            // Spawn new enemy
            if (enemies.length < 10) spawnEnemy();

            updateComboMultiplier();
        }

        function addCombo() {
            comboCounter++;
            comboTimer = 0;
            updateComboDisplay();
        }

        function updateComboMultiplier() {
            if (comboCounter < 5) comboMultiplier = 1;
            else if (comboCounter < 10) comboMultiplier = 1.5;
            else if (comboCounter < 20) comboMultiplier = 2;
            else if (comboCounter < 35) comboMultiplier = 2.5;
            else comboMultiplier = 3;

            updateStyleRank();
        }

        function updateStyleRank() {
            if (comboCounter < 3) styleRank = 'D';
            else if (comboCounter < 7) styleRank = 'C';
            else if (comboCounter < 15) styleRank = 'B';
            else if (comboCounter < 25) styleRank = 'A';
            else styleRank = 'S';

            document.getElementById('styleRank').textContent = `STYLE: ${styleRank}`;
        }

        function addScore(points) {
            score += Math.floor(points);
            updateHUD();
        }

        function updateComboDisplay() {
            maxCombo = Math.max(maxCombo, comboCounter);
            document.getElementById('combo').textContent = `COMBO: ${comboCounter}x`;
            document.getElementById('combo').style.color = comboCounter > 0 ? '#ff0000' : '#666666';
        }

        function updateWeaponDisplay() {
            document.getElementById('weapon').textContent = `⚔ Weapon: ${weapons[selectedWeapon]}`;
        }

        function updateHUD() {
            document.getElementById('health').textContent = `❤ Health: ${Math.ceil(health)}`;
            document.getElementById('score').textContent = `$ Score: ${score}`;
            document.getElementById('kills').textContent = `☠ Kills: ${killCount}`;
        }

        // ==================== PARTICLES ====================
        function createParticle(pos, vel, color, life) {
            const geometry = new THREE.SphereGeometry(0.1, 4, 4);
            const material = new THREE.MeshBasicMaterial({ color });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(pos);

            scene.add(mesh);

            particles.push({
                mesh: mesh,
                velocity: vel.clone(),
                life: life,
                maxLife: life,
                color: color
            });
        }

        function createBloodParticles(pos) {
            for (let i = 0; i < 15; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 0.3 + 0.1;
                const vel = new THREE.Vector3(
                    Math.cos(angle) * speed,
                    Math.random() * 0.2 + 0.1,
                    Math.sin(angle) * speed
                );
                createParticle(pos.clone(), vel, 0xff0000, 1.5);
            }
        }

        // ==================== GAME LOOP ====================
        function gameLoop() {
            requestAnimationFrame(gameLoop);

            if (!gameActive) return;

            // Player movement
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);

            if (keys['w']) player.velocity.add(forward.multiplyScalar(player.speed));
            if (keys['s']) player.velocity.add(forward.multiplyScalar(-player.speed));
            if (keys['a']) player.velocity.add(right.multiplyScalar(-player.speed));
            if (keys['d']) player.velocity.add(right.multiplyScalar(player.speed));

            // Gravity & damping
            player.velocity.y -= 0.01;
            player.velocity.multiplyScalar(0.93);

            player.position.add(player.velocity);

            // Ground collision
            if (player.position.y <= 1.6) {
                player.position.y = 1.6;
                player.velocity.y = 0;
                player.onGround = true;
            }

            // Boundaries
            player.position.x = Math.max(-240, Math.min(240, player.position.x));
            player.position.z = Math.max(-240, Math.min(240, player.position.z));

            // Screen shake
            if (shakeIntensity > 0) {
                const shake = (Math.random() - 0.5) * shakeIntensity * 0.1;
                camera.position.copy(originalCameraPos).add(new THREE.Vector3(
                    (Math.random() - 0.5) * shakeIntensity * 0.2,
                    (Math.random() - 0.5) * shakeIntensity * 0.2,
                    0
                ));
                shakeIntensity *= 0.85;
            } else {
                camera.position.copy(originalCameraPos);
            }

            // Update combo timer
            comboTimer += 0.016;
            if (comboTimer > 3 && comboCounter > 0) {
                comboCounter = 0;
                updateComboDisplay();
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.velocity);
                p.life -= 0.016;
                p.mesh.material.opacity = p.life / p.maxLife;

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }

            // Update enemies
            enemies.forEach((enemy, idx) => {
                const dir = player.position.clone().sub(enemy.mesh.position).normalize();
                const dist = player.position.distanceTo(enemy.mesh.position);

                enemy.mesh.position.add(dir.multiplyScalar(enemy.speed));

                // Enemy attack
                if (dist < 2.5) {
                    health -= 0.08;
                    enemy.mesh.material.color.set(0xffffff);
                    setTimeout(() => {
                        enemy.mesh.material.color.set(enemy.isBoss ? 0xffffff : 0xff6600);
                    }, 50);
                }

                updateHUD();

                if (health <= 0) {
                    gameActive = false;
                    document.getElementById('gameOver').style.display = 'block';
                    document.getElementById('finalScore').textContent = `Score: ${score}`;
                    document.getElementById('finalCombo').textContent = `Max Combo: ${maxCombo}x`;
                }
            });

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Start!
        init();
    </script>
</body>
</html>
