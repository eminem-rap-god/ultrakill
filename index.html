<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRAMURDER - FPS Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 18px;
            z-index: 100;
            font-family: 'Courier New', monospace;
        }

        #health {
            color: #00ff00;
            margin: 10px 0;
        }

        #ammo {
            color: #ffff00;
            margin: 10px 0;
        }

        #score {
            color: #ff0000;
            margin: 10px 0;
            font-size: 24px;
            font-weight: bold;
        }

        #weapon {
            color: #00ffff;
            margin: 10px 0;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 2px solid #00ff00;
            border-radius: 50%;
            z-index: 200;
            pointer-events: none;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            text-align: center;
            border: 3px solid #ff0000;
            display: none;
            z-index: 300;
            font-size: 32px;
        }

        #gameOver button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 18px;
            background: #ff0000;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="gameContainer"></div>
    <div id="hud">
        <div id="health">Health: 100</div>
        <div id="ammo">Ammo: ∞</div>
        <div id="weapon">Weapon: PISTOL</div>
        <div id="score">Score: 0</div>
    </div>
    <div id="crosshair"></div>
    <div id="gameOver">
        <div>GAME OVER</div>
        <div id="finalScore">Score: 0</div>
        <button onclick="location.reload()">Restart</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game Variables
        let scene, camera, renderer;
        let player, enemies = [];
        let health = 100, score = 0;
        let keys = {};
        let mouseX = 0, mouseY = 0;
        let selectedWeapon = 0;
        const weapons = ['PISTOL', 'SHOTGUN', 'ROCKET'];
        let canShoot = true;
        let gameActive = true;

        // Initialize Game
        function init() {
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            scene.fog = new THREE.Fog(0x1a1a1a, 500, 1000);

            // Camera Setup
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 0);

            // Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('gameContainer').appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(50, 50, 50);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);

            // Ground
            const groundGeometry = new THREE.PlaneGeometry(500, 500);
            const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Walls
            createWalls();

            // Create Player
            player = {
                position: new THREE.Vector3(0, 1.5, 0),
                velocity: new THREE.Vector3(0, 0, 0),
                speed: 0.3,
                jumpPower: 0.15,
                onGround: false
            };

            // Spawn Enemies
            for (let i = 0; i < 5; i++) {
                spawnEnemy();
            }

            // Event Listeners
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onShoot);
            window.addEventListener('resize', onWindowResize);

            // Lock Pointer
            document.addEventListener('click', () => {
                renderer.domElement.requestPointerLock = renderer.domElement.requestPointerLock || renderer.domElement.mozRequestPointerLock;
                renderer.domElement.requestPointerLock();
            });

            // Start Game Loop
            gameLoop();
        }

        function createWalls() {
            const walls = [
                { pos: [0, 5, -250], size: [500, 50, 10] },
                { pos: [0, 5, 250], size: [500, 50, 10] },
                { pos: [-250, 5, 0], size: [10, 50, 500] },
                { pos: [250, 5, 0], size: [10, 50, 500] }
            ];

            walls.forEach(wall => {
                const geometry = new THREE.BoxGeometry(...wall.size);
                const material = new THREE.MeshStandardMaterial({ color: 0x444444 });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(...wall.pos);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);
            });
        }

        function spawnEnemy() {
            const geometry = new THREE.BoxGeometry(1, 2, 1);
            const material = new THREE.MeshStandardMaterial({ color: Math.random() * 0xff0000 });
            const enemy = new THREE.Mesh(geometry, material);
            
            let x, z, dist;
            do {
                x = (Math.random() - 0.5) * 400;
                z = (Math.random() - 0.5) * 400;
                dist = Math.sqrt(x * x + z * z);
            } while (dist < 50);

            enemy.position.set(x, 1, z);
            enemy.castShadow = true;
            enemy.receiveShadow = true;

            const enemyData = {
                mesh: enemy,
                health: 30,
                speed: 0.08,
                attackCooldown: 0,
                lastAttackTime: 0
            };

            enemies.push(enemyData);
            scene.remove(scene.getObjectByName('enemy'));
            scene.add(enemy);
        }

        function onKeyDown(e) {
            keys[e.key.toLowerCase()] = true;

            if (e.key === ' ') {
                if (player.onGround) {
                    player.velocity.y = player.jumpPower;
                    player.onGround = false;
                }
            }

            if (e.key === 'e' || e.key === 'E') {
                selectedWeapon = (selectedWeapon + 1) % weapons.length;
                document.getElementById('weapon').textContent = `Weapon: ${weapons[selectedWeapon]}`;
            }
        }

        function onKeyUp(e) {
            keys[e.key.toLowerCase()] = false;
        }

        function onMouseMove(e) {
            if (document.pointerLockElement) {
                const sensitivity = 0.003;
                camera.rotation.order = 'YXZ';
                camera.rotation.y -= e.movementX * sensitivity;
                camera.rotation.x -= e.movementY * sensitivity;

                camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
            }
        }

        function onShoot() {
            if (!canShoot || !gameActive) return;

            canShoot = false;
            setTimeout(() => canShoot = true, 100);

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

            let damageDealt = selectedWeapon === 0 ? 10 : selectedWeapon === 1 ? 25 : 50;

            for (let enemy of enemies) {
                if (raycaster.ray.distanceToPoint(enemy.mesh.position) < 2) {
                    enemy.health -= damageDealt;
                    enemy.mesh.material.color.set(0xff0000);
                    setTimeout(() => enemy.mesh.material.color.set(0xff6600), 50);

                    if (enemy.health <= 0) {
                        score += 100;
                        scene.remove(enemy.mesh);
                        enemies.splice(enemies.indexOf(enemy), 1);
                        if (enemies.length < 8) spawnEnemy();
                    }
                }
            }

            document.getElementById('score').textContent = `Score: ${score}`;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function gameLoop() {
            requestAnimationFrame(gameLoop);

            if (!gameActive) return;

            // Player Movement
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);

            if (keys['w']) player.velocity.add(forward.multiplyScalar(player.speed));
            if (keys['s']) player.velocity.add(forward.multiplyScalar(-player.speed));
            if (keys['a']) player.velocity.add(right.multiplyScalar(-player.speed));
            if (keys['d']) player.velocity.add(right.multiplyScalar(player.speed));

            // Gravity
            player.velocity.y -= 0.01;
            player.velocity.multiplyScalar(0.95);

            player*
