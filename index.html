<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRAKIll- remmake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #0f0;
            overflow: hidden;
            filter: contrast(1.1) brightness(1.05);
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
        }

        #scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 150;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 14px;
            z-index: 100;
            text-shadow: 0 0 10px #0f0;
        }

        .hud-item {
            margin: 8px 0;
            border: 1px solid #0f0;
            padding: 5px 10px;
            background: rgba(0, 255, 0, 0.1);
        }

        #room-indicator {
            color: #ffff00;
            font-weight: bold;
        }

        #health {
            color: #00ff00;
        }

        #score {
            color: #ff0000;
            font-size: 20px;
            font-weight: bold;
        }

        #weapon {
            color: #00ffff;
        }

        #combo {
            position: absolute;
            top: 50%;
            right: 50px;
            font-size: 28px;
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000;
            font-weight: bold;
            z-index: 100;
        }

        #styleRank {
            position: absolute;
            top: 100px;
            right: 50px;
            font-size: 18px;
            border: 2px solid #0f0;
            padding: 10px;
            background: rgba(0, 255, 0, 0.2);
            z-index: 100;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 2px solid #00ff00;
            border-radius: 50%;
            z-index: 200;
            pointer-events: none;
            box-shadow: 0 0 10px #00ff00;
        }

        #jumpButton {
            position: absolute;
            bottom: 50px;
            left: 50px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(0, 255, 0, 0.3);
            border: 2px solid #00ff00;
            color: #00ff00;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            transition: all 0.1s;
            text-shadow: 0 0 10px #00ff00;
        }

        #jumpButton:hover {
            background: rgba(0, 255, 0, 0.6);
            box-shadow: 0 0 20px #00ff00;
        }

        #jumpButton:active {
            transform: scale(0.95);
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            text-align: center;
            border: 3px solid #ff0000;
            display: none;
            z-index: 300;
            font-size: 32px;
            box-shadow: 0 0 50px #ff0000;
        }

        #gameOver button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 18px;
            background: #ff0000;
            color: #0f0;
            border: 2px solid #0f0;
            cursor: pointer;
            text-shadow: 0 0 5px #ff0000;
        }

        #gameOver button:hover {
            box-shadow: 0 0 20px #ff0000;
        }

        .door-hint {
            position: absolute;
            color: #ffff00;
            font-size: 12px;
            text-shadow: 0 0 5px #ffff00;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="gameContainer"></div>
    <div id="scanlines"></div>

    <div id="hud">
        <div class="hud-item" id="room-indicator">📍 ROOM: 1</div>
        <div class="hud-item" id="health">❤ Health: 100</div>
        <div class="hud-item" id="weapon">⚔ Weapon: PISTOL</div>
        <div class="hud-item" id="score">$ Score: 0</div>
        <div class="hud-item" id="kills">☠ Kills: 0</div>
    </div>

    <div id="combo">COMBO: 0x</div>
    <div id="styleRank">STYLE: D</div>
    <div id="crosshair"></div>
    <button id="jumpButton">JUMP [SPACE]</button>

    <div id="gameOver">
        <div>GAME OVER</div>
        <div id="finalScore">Score: 0</div>
        <div id="finalCombo">Max Combo: 0x</div>
        <button onclick="location.reload()">Restart</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ==================== GAME STATE ====================
        let scene, camera, renderer;
        let player, enemies = [];
        let health = 100, score = 0, killCount = 0;
        let keys = {};
        let selectedWeapon = 0;
        const weapons = ['PISTOL', 'SHOTGUN', 'ROCKET', 'MELEE'];
        let canShoot = true;
        let gameActive = true;

        // Room System
        let currentRoom = 1;
        const totalRooms = 4;
        let doors = [];

        // Advanced mechanics
        let comboCounter = 0;
        let comboTimer = 0;
        let comboMultiplier = 1;
        let styleRank = 'D';
        let maxCombo = 0;

        // Dash system
        let canDash = true;
        let dashCooldown = 0.5;
        let lastDashTime = 0;

        // Melee system
        let meleeCooldown = 0.6;
        let lastMeleeTime = 0;

        // Screen shake
        let shakeIntensity = 0;
        let originalCameraPos = new THREE.Vector3();

        // Particles
        let particles = [];

        // ==================== HUMANOID ENEMY CREATOR ====================
        function createHumanoidEnemy(isBoss = false) {
            const group = new THREE.Group();

            // Body
            const bodyGeometry = new THREE.BoxGeometry(0.6, 1.2, 0.4);
            const bodyMaterial = new THREE.MeshStandardMaterial({
                color: isBoss ? 0xffffff : 0xff3333,
                emissive: isBoss ? 0xffffff : 0xff3333,
                emissiveIntensity: isBoss ? 0.8 : 0.3,
                metalness: 0.7,
                roughness: 0.3
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 0.6;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);

            // Head
            const headGeometry = new THREE.SphereGeometry(0.35, 8, 8);
            const headMaterial = new THREE.MeshStandardMaterial({
                color: isBoss ? 0xcccccc : 0xff6666,
                emissive: isBoss ? 0xffffff : 0xff3333,
                emissiveIntensity: isBoss ? 0.6 : 0.2,
                metalness: 0.8,
                roughness: 0.2
            });
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = 1.5;
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);

            // Left Arm
            const armGeometry = new THREE.BoxGeometry(0.2, 1, 0.2);
            const armMaterial = new THREE.MeshStandardMaterial({
                color: isBoss ? 0xffffff : 0xff3333,
                emissive: isBoss ? 0xffffff : 0xff3333,
                emissiveIntensity: isBoss ? 0.5 : 0.2,
                metalness: 0.6,
                roughness: 0.4
            });
            const leftArm = new THREE.Mesh(armGeometry, armMaterial);
            leftArm.position.set(-0.5, 0.9, 0);
            leftArm.rotation.z = 0.3;
            leftArm.castShadow = true;
            group.add(leftArm);

            // Right Arm
            const rightArm = new THREE.Mesh(armGeometry, armMaterial);
            rightArm.position.set(0.5, 0.9, 0);
            rightArm.rotation.z = -0.3;
            rightArm.castShadow = true;
            group.add(rightArm);

            // Left Leg
            const legGeometry = new THREE.BoxGeometry(0.25, 1, 0.25);
            const legMaterial = new THREE.MeshStandardMaterial({
                color: isBoss ? 0x888888 : 0xcc0000,
                emissive: isBoss ? 0x888888 : 0x660000,
                emissiveIntensity: isBoss ? 0.4 : 0.1,
                metalness: 0.5,
                roughness: 0.5
            });
            const leftLeg = new THREE.Mesh(legGeometry, legMaterial);
            leftLeg.position.set(-0.25, 0.2, 0);
            leftLeg.castShadow = true;
            group.add(leftLeg);

            // Right Leg
            const rightLeg = new THREE.Mesh(legGeometry, legMaterial);
            rightLeg.position.set(0.25, 0.2, 0);
            rightLeg.castShadow = true;
            group.add(rightLeg);

            // Eyes
            const eyeGeometry = new THREE.SphereGeometry(0.08, 4, 4);
            const eyeMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            
            const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            leftEye.position.set(-0.12, 1.65, 0.3);
            group.add(leftEye);

            const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            rightEye.position.set(0.12, 1.65, 0.3);
            group.add(rightEye);

            if (isBoss) {
                group.scale.set(1.8, 2.2, 1.8);
            }

            return group;
        }

        // ==================== DOOR SYSTEM ====================
        function createDoor(position, targetRoom, direction) {
            const doorGeometry = new THREE.BoxGeometry(2, 3, 0.2);
            const doorMaterial = new THREE.MeshStandardMaterial({
                color: 0xffff00,
                emissive: 0xffff00,
                emissiveIntensity: 0.5,
                metalness: 0.9,
                roughness: 0.1
            });
            const doorMesh = new THREE.Mesh(doorGeometry, doorMaterial);
            doorMesh.position.copy(position);
            doorMesh.castShadow = true;
            doorMesh.receiveShadow = true;
            scene.add(doorMesh);

            const doorData = {
                mesh: doorMesh,
                position: position.clone(),
                targetRoom: targetRoom,
                triggerRadius: 3
            };

            doors.push(doorData);
            return doorMesh;
        }

        // ==================== INITIALIZATION ====================
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            scene.fog = new THREE.Fog(0x0a0a0a, 300, 600);

            camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 0);
            originalCameraPos.copy(camera.position);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFShadowShadowMap;
            document.getElementById('gameContainer').appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xff6600, 0.4);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xff3300, 1.2);
            directionalLight.position.set(100, 100, 100);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 4096;
            directionalLight.shadow.mapSize.height = 4096;
            directionalLight.shadow.camera.far = 500;
            scene.add(directionalLight);

            // Ground
            const groundGeometry = new THREE.PlaneGeometry(500, 500);
            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a1a1a,
                metalness: 0.8,
                roughness: 0.2
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Create current room
            createRoom(currentRoom);

            player = {
                position: new THREE.Vector3(0, 1.6, 0),
                velocity: new THREE.Vector3(0, 0, 0),
                speed: 0.35,
                dashSpeed: 0.8,
                jumpPower: 0.18,
                onGround: false
            };

            // Event listeners
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onShoot);
            window.addEventListener('resize', onWindowResize);

            document.getElementById('jumpButton').addEventListener('click', () => {
                if (player.onGround) {
                    player.velocity.y = player.jumpPower;
                    player.onGround = false;
                }
            });

            document.addEventListener('click', () => {
                renderer.domElement.requestPointerLock = renderer.domElement.requestPointerLock || renderer.domElement.mozRequestPointerLock;
                renderer.domElement.requestPointerLock();
            });

            gameLoop();
        }

        function createRoom(roomNum) {
            doors = [];
            
            // Room walls with different colors
            const roomColors = [
                [0xff0000, 0x00ff00, 0x0000ff, 0xffff00],
                [0xff6600, 0x00ffff, 0xff00ff, 0x66ff00],
                [0x00ff66, 0xff0066, 0x6600ff, 0xffff00],
                [0xffffff, 0xff0000, 0x00ff00, 0x0000ff]
            ];

            const colors = roomColors[roomNum - 1];
            const wallConfigs = [
                { pos: [0, 5, -250], size: [500, 50, 10], color: colors[0] },
                { pos: [0, 5, 250], size: [500, 50, 10], color: colors[1] },
                { pos: [-250, 5, 0], size: [10, 50, 500], color: colors[2] },
                { pos: [250, 5, 0], size: [10, 50, 500], color: colors[3] }
            ];

            wallConfigs.forEach(wall => {
                const geometry = new THREE.BoxGeometry(...wall.size);
                const material = new THREE.MeshStandardMaterial({
                    color: wall.color,
                    emissive: wall.color,
                    emissiveIntensity: 0.3,
                    metalness: 0.9,
                    roughness: 0.1
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(...wall.pos);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);

                const light = new THREE.PointLight(wall.color, 1, 200);
                light.position.copy(mesh.position);
                scene.add(light);
            });

            // Create doors to other rooms
            if (roomNum < totalRooms) {
                createDoor(new THREE.Vector3(0, 1.5, 240), roomNum + 1, 'forward');
            }
            if (roomNum > 1) {
                createDoor(new THREE.Vector3(0, 1.5, -240), roomNum - 1, 'back');
            }

            // Spawn enemies (more in later rooms)
            const enemyCount = 5 + (roomNum * 2);
            for (let i = 0; i < enemyCount; i++) {
                spawnEnemy();
            }

            document.getElementById('room-indicator').textContent = `📍 ROOM: ${roomNum}`;
        }

        function spawnEnemy() {
            const isBoss = currentRoom > 1 && Math.random() > 0.9;
            const enemyMesh = createHumanoidEnemy(isBoss);

            let x, z, dist;
            do {
                x = (Math.random() - 0.5) * 400;
                z = (Math.random() - 0.5) * 400;
                dist = Math.sqrt(x * x + z * z);
            } while (dist < 50);

            enemyMesh.position.set(x, 0, z);

            const enemyData = {
                mesh: enemyMesh,
                health: isBoss ? 200 : 40 + (currentRoom * 10),
                maxHealth: isBoss ? 200 : 40 + (currentRoom * 10),
                speed: (0.09 + Math.random() * 0.03) * (1 + currentRoom * 0.1),
                isBoss: isBoss,
                animationTime: Math.random() * Math.PI * 2,
                attackCooldown: 0
            };

            enemies.push(enemyData);
            scene.add(enemyMesh);
        }

        function transitionRoom(targetRoom) {
            // Clear current room
            enemies.forEach(e => scene.remove(e.mesh));
            enemies = [];
            doors.forEach(d => scene.remove(d.mesh));
            doors = [];

            // Clear other objects
            const objectsToRemove = [];
            scene.traverse(obj => {
                if (obj !== scene && obj !== camera && obj.name !== 'light' && obj.name !== 'ground') {
                    if (obj.parent === scene) objectsToRemove.push(obj);
                }
            });
            objectsToRemove.forEach(obj => scene.remove(obj));

            currentRoom = targetRoom;
            createRoom(currentRoom);

            // Reset player position
            player.position.set(0, 1.6, 0);
            player.velocity.set(0, 0, 0);
            camera.position.copy(player.position);
            originalCameraPos.copy(camera.position);
        }

        // ==================== INPUT HANDLERS ====================
        function onKeyDown(e) {
            keys[e.key.toLowerCase()] = true;

            if (e.key === ' ' && player.onGround) {
                player.velocity.y = player.jumpPower;
                player.onGround = false;
            }

            if ((e.key === 'shift' || e.key === 'Shift') && canDash) {
                performDash();
            }

            if (e.key === 'f' || e.key === 'F') {
                performMelee();
            }

            if (e.key === 'e' || e.key === 'E') {
                selectedWeapon = (selectedWeapon + 1) % weapons.length;
                updateWeaponDisplay();
            }

            for (let i = 1; i <= 4; i++) {
                if (e.key === String(i)) {
                    selectedWeapon = i - 1;
                    updateWeaponDisplay();
                }
            }
        }

        function onKeyUp(e) {
            keys[e.key.toLowerCase()] = false;
        }

        function onMouseMove(e) {
            if (document.pointerLockElement) {
                const sensitivity = 0.004;
                camera.rotation.order = 'YXZ';
                camera.rotation.y -= e.movementX * sensitivity;
                camera.rotation.x -= e.movementY * sensitivity;
                camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
            }
        }

        function onShoot() {
            if (!canShoot || !gameActive) return;

            if (selectedWeapon === 3) {
                performMelee();
                return;
            }

            canShoot = false;
            const weaponFireRates = [80, 120, 180];
            setTimeout(() => canShoot = true, weaponFireRates[selectedWeapon]);

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

            const damages = [15, 35, 75];
            const damage = damages[selectedWeapon];

            let hitEnemy = false;

            for (let enemy of enemies) {
                if (raycaster.ray.distanceToPoint(enemy.mesh.position) < 2) {
                    enemy.health -= damage;
                    hitEnemy = true;

                    shakeIntensity = Math.min(shakeIntensity + 0.3, 1);
                    createBloodParticles(enemy.mesh.position);

                    if (enemy.health <= 0) {
                        onEnemyKilled(enemy);
                    }
                }
            }

            if (hitEnemy) {
                addScore(50 * comboMultiplier);
                addCombo();
            }
        }

        function performDash() {
            canDash = false;
            lastDashTime = Date.now() / 1000;

            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);

            let dashDir = new THREE.Vector3(0, 0, 0);
            if (keys['w']) dashDir.add(forward);
            if (keys['s']) dashDir.add(forward.multiplyScalar(-1));
            if (keys['a']) dashDir.add(right.multiplyScalar(-1));
            if (keys['d']) dashDir.add(right);

            if (dashDir.length() === 0) dashDir = forward;
            dashDir.normalize();

            player.velocity.add(dashDir.multiplyScalar(player.dashSpeed));
            shakeIntensity = 0.5;

            for (let i = 0; i < 10; i++) {
                createParticle(player.position.clone(), dashDir.multiplyScalar(0.3), 0x00ff00, 0.3);
            }

            setTimeout(() => canDash = true, dashCooldown * 1000);
        }

        function performMelee() {
            if (Date.now() / 1000 - lastMeleeTime < meleeCooldown) return;
            lastMeleeTime = Date.now() / 1000;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

            for (let enemy of enemies) {
                if (raycaster.ray.distanceToPoint(enemy.mesh.position) < 3) {
                    enemy.health -= 50;
                    const knockback = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    enemy.mesh.position.add(knockback.multiplyScalar(0.3));
                    shakeIntensity = 0.8;
                    createBloodParticles(enemy.mesh.position);
                    addScore(100 * comboMultiplier);
                    addCombo();

                    if (enemy.health <= 0) {
                        onEnemyKilled(enemy);
                    }
                }
            }
        }

        // ==================== GAMEPLAY ====================
        function onEnemyKilled(enemy) {
            score += (enemy.isBoss ? 1000 : 200) * comboMultiplier;
            killCount++;

            shakeIntensity = 1;

            for (let i = 0; i < 30; i++) {
                const angle = (Math.PI * 2 / 30) * i;
                const dir = new THREE.Vector3(Math.cos(angle), Math.random() * 0.5, Math.sin(angle)).normalize();
                createParticle(enemy.mesh.position.clone(), dir, 0xff0000, 0.8);
            }

            scene.remove(enemy.mesh);
            enemies.splice(enemies.indexOf(enemy), 1);

            // Check if room is cleared
            if (enemies.length === 0 && currentRoom < totalRooms) {
                console.log("Room cleared! Door to next room is open");
            }

            updateComboMultiplier();
        }

        function addCombo() {
            comboCounter++;
            comboTimer = 0;
            updateComboDisplay();
        }

        function updateComboMultiplier() {
            if (comboCounter < 5) comboMultiplier = 1;
            else if (comboCounter < 10) comboMultiplier = 1.5;
            else if (comboCounter < 20) comboMultiplier = 2;
            else if (comboCounter < 35) comboMultiplier = 2.5;
            else comboMultiplier = 3;

            updateStyleRank();
        }

        function updateStyleRank() {
            if (comboCounter < 3) styleRank = 'D';
            else if (comboCounter < 7) styleRank = 'C';
            else if (comboCounter < 15) styleRank = 'B';
            else if (comboCounter < 25) styleRank = 'A';
            else styleRank = 'S';

            document.getElementById('styleRank').textContent = `STYLE: ${styleRank}`;
        }

        function addScore(points) {
            score += Math.floor(points);
            updateHUD();
        }

        function updateComboDisplay() {
            maxCombo = Math.max(maxCombo, comboCounter);
            document.getElementById('combo').textContent = `COMBO: ${comboCounter}x`;
            document.getElementById('combo').style.color = comboCounter > 0 ? '#ff0000' : '#666666';
        }

        function updateWeaponDisplay() {
            document.getElementById('weapon').textContent = `⚔ Weapon: ${weapons[selectedWeapon]}`;
        }

        function updateHUD() {
            document.getElementById('health').textContent = `❤ Health: ${Math.ceil(health)}`;
            document.getElementById('score').textContent = `$ Score: ${score}`;
            document.getElementById('kills').textContent = `☠ Kills: ${killCount}`;
        }

        // ==================== PARTICLES ====================
        function createParticle(pos, vel, color, life) {
            const geometry = new THREE.SphereGeometry(0.1, 4, 4);
            const material = new THREE.MeshBasicMaterial({ color });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(pos);
            scene.add(mesh);

            particles.push({
                mesh: mesh,
                velocity: vel.clone(),
                life: life,
                maxLife: life
            });
        }

        function createBloodParticles(pos) {
            for (let i = 0; i < 20; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 0.4 + 0.15;
                const vel = new THREE.Vector3(
                    Math.cos(angle) * speed,
                    Math.random() * 0.3 + 0.1,
                    Math.sin(angle) * speed
                );
                createParticle(pos.clone(), vel, 0xff0000, 1.5);
            }
        }

        // ==================== GAME LOOP ====================
        function gameLoop() {
            requestAnimationFrame(gameLoop);

            if (!gameActive) return;

            // Player movement
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);

            if (keys['w']) player.velocity.add(forward.multiplyScalar(player.speed));
            if (keys['s']) player.velocity.add(forward.multiplyScalar(-player.speed));
            if (keys['a']) player.velocity.add(right.multiplyScalar(-player.speed));
            if (keys['d']) player.velocity.add(right.multiplyScalar(player.speed));

            player.velocity.y -= 0.01;
            player.velocity.multiplyScalar(0.93);
            player.position.add(player.velocity);

            if (player.position.y <= 1.6) {
                player.position.y = 1.6;
                player.velocity.y = 0;
                player.onGround = true;
            }

            player.position.x = Math.max(-240, Math.min(240, player.position.x));
            player.position.z = Math.max(-240, Math.min(240, player.position.z));

            // Check door collisions
            doors.forEach(door => {
                const dist = player.position.distanceTo(door.position);
                if (dist < door.triggerRadius) {
                    transitionRoom(door.targetRoom);
                }
            });

            // Screen shake
            if (shakeIntensity > 0) {
                camera.position.copy(originalCameraPos).add(new THREE.Vector3(
                    (Math.random() - 0.5) * shakeIntensity * 0.2,
                    (Math.random() - 0.5) * shakeIntensity * 0.2,
                    0
                ));
                shakeIntensity *= 0.85;
            } else {
                camera.position.copy(originalCameraPos);
            }

            // Combo timer
            comboTimer += 0.016;
            if (comboTimer > 3 && comboCounter > 0) {
                comboCounter = 0;
                updateComboDisplay();
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.velocity);
                p.life -= 0.016;
                p.mesh.material.opacity = p.life / p.maxLife;

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }

            // Update enemies
            enemies.forEach((enemy) => {
                const dir = player.position.clone().sub(enemy.mesh.position).normalize();
                const dist = player.position.distanceTo(enemy.mesh.position);

                enemy.mesh.position.add(dir.multiplyScalar(enemy.speed));

                // Walking animation
                enemy.animationTime += 0.05;
                enemy.mesh.children[3].position.y = 0.2 + Math.sin(enemy.animationTime) * 0.05;
                enemy.mesh.children[4].position.y = 0.2 - Math.sin(enemy.animationTime) * 0.05;

                // Enemy attack
                if (dist < 2.5) {
                    health -= 0.08;
                }

                updateHUD();

                if (health <= 0) {
                    gameActive = false;
                    document.getElementById('gameOver').style.display = 'block';
                    document.getElementById('finalScore').textContent = `Score: ${score}`;
                    document.getElementById('finalCombo').textContent = `Max Combo: ${maxCombo}x`;
                }
            });

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
