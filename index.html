<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Game Room</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        .room { display: none; }\n        .active { display: block; }\n        #jumpButton { margin: 20px; padding: 10px; background-color: #6C63FF; color: white; border: none; cursor: pointer; }\n        .door { margin: 10px; padding: 10px; background-color: #FF6B6B; cursor: pointer; }\n    </style>\n</head>\n<body>\n    <div id="room1" class="room active">\n        <h1>Room 1</h1>\n        <div class="door" onclick="transitionTo('room2')">Door to Room 2</div>\n        <button id="jumpButton" onclick="jump()">Jump</button>\n    </div>\n    <div id="room2" class="room">\n        <h1>Room 2</h1>\n        <div class="door" onclick="transitionTo('room1')">Door to Room 1</div>\n        <button id="jumpButton" onclick="jump()">Jump</button>\n    </div>\n    <script>\n        function jump() {\n            alert('Jump button pressed!');\n        }\n        function transitionTo(room) {\n            const rooms = document.querySelectorAll('.room');\n            rooms.forEach(r => r.classList.remove('active'));\n            document.getElementById(room).classList.add('active');\n        }\n    </script>\n</body>\n</html>\n
